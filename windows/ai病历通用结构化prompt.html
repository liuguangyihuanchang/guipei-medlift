<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>规培-medlift — AI 病历通用结构化 Prompt 生成器</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #f0f4f8; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; margin-bottom: 20px; font-size: 14px; }
        .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        label { display: block; font-weight: bold; margin-bottom: 6px; color: #34495e; font-size: 14px; }
        input, textarea { width: 100%; padding: 10px 12px; border: 1.5px solid #d0d7de; border-radius: 8px; font-size: 15px; font-family: inherit; margin-bottom: 14px; outline: none; transition: border-color 0.2s; }
        input:focus, textarea:focus { border-color: #3498db; }
        textarea { resize: vertical; min-height: 100px; }
        .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        .btn-primary { background: #3498db; color: white; }
        .btn-primary:hover { opacity: 0.85; }
        #output { background: #1e1e1e; color: #d4d4d4; padding: 20px; border-radius: 8px; font-family: "Courier New", monospace; font-size: 14px; white-space: pre-wrap; min-height: 150px; }
        .config-section { background: #e8f4fd; border: 1.5px solid #3498db33; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .config-section h3 { color: #3498db; font-size: 14px; margin-bottom: 12px; }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .copy-btn { background: #27ae60; color: white; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; margin-top: 10px; }
        .copy-btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
<div class="container">
    <h1>🤖 规培-medlift</h1>
    <p class="subtitle">MedLift = Medical + Lift — 把病历重担从规培医生肩上抬走</p>

    <!-- API Config -->
    <div class="config-section">
        <h3>⚙️ API 配置（OpenAI 兼容）</h3>
        <div class="config-grid">
            <div>
                <label>API URL</label>
                <input type="text" id="apiUrl" placeholder="https://open.bigmodel.cn/api/paas/v4" value="https://open.bigmodel.cn/api/paas/v4">
            </div>
            <div>
                <label>API Key</label>
                <input type="password" id="apiKey" placeholder="输入你的 API Key">
            </div>
            <div style="grid-column:1/-1">
                <label>模型名称</label>
                <input type="text" id="modelName" placeholder="e.g. glm-4-flash, gpt-4o" value="glm-4-flash">
            </div>
        </div>
    </div>

    <!-- Patient Info -->
    <div class="card">
        <h3 style="margin-bottom:14px;color:#2c3e50;">📋 患者基本信息</h3>
        <div class="row">
            <div>
                <label>患者姓名（选填）</label>
                <input type="text" id="patientName" placeholder="用于 prompt 优化">
            </div>
            <div>
                <label>性别</label>
                <input type="text" id="gender" placeholder="男 / 女">
            </div>
            <div>
                <label>年龄</label>
                <input type="text" id="age" placeholder="e.g. 58岁">
            </div>
        </div>
        <label>关键日期</label>
        <div class="row">
            <input type="text" id="admitDate" placeholder="入院日期，如：2026-05-20">
            <input type="text" id="surgeryDate" placeholder="手术日期（选填）">
            <input type="text" id="dischargeDate" placeholder="出院日期（选填）">
        </div>
    </div>

    <!-- Clinical Info -->
    <div class="card">
        <h3 style="margin-bottom:14px;color:#2c3e50;">🩺 临床信息</h3>
        <label>既往病史</label>
        <textarea id="history" placeholder="患者既往病史、过敏史、手术史等..."></textarea>

        <label>在院检验结果（可粘贴化验单文字）</label>
        <textarea id="labResults" placeholder="血常规、尿常规、生化等检验结果..."></textarea>

        <label>在院检查报告（可粘贴检查描述）</label>
        <textarea id="imagingResults" placeholder="CT、MRI、X光、B超等报告描述..."></textarea>

        <label>当前医嘱 / 用药方案</label>
        <textarea id="orders" placeholder="当前住院医嘱、用药方案..."></textarea>
    </div>

    <!-- Generate Button -->
    <div style="text-align:center; margin-bottom:20px;">
        <button class="btn btn-primary" onclick="generateAndSend()">📤 生成病程记录</button>
    </div>

    <!-- Output -->
    <div class="card">
        <h3 style="margin-bottom:14px;color:#2c3e50;">📄 AI 生成结果</h3>
        <div id="output">等待生成...</div>
        <button class="copy-btn" onclick="copyOutput()">📋 复制结果</button>
    </div>
</div>

<script>
async function generateAndSend() {
    const apiUrl = document.getElementById('apiUrl').value.trim();
    const apiKey = document.getElementById('apiKey').value.trim();
    const modelName = document.getElementById('modelName').value.trim();
    const patientName = document.getElementById('patientName').value.trim();
    const gender = document.getElementById('gender').value.trim();
    const age = document.getElementById('age').value.trim();
    const admitDate = document.getElementById('admitDate').value.trim();
    const surgeryDate = document.getElementById('surgeryDate').value.trim();
    const dischargeDate = document.getElementById('dischargeDate').value.trim();
    const history = document.getElementById('history').value.trim();
    const labResults = document.getElementById('labResults').value.trim();
    const imagingResults = document.getElementById('imagingResults').value.trim();
    const orders = document.getElementById('orders').value.trim();

    if (!apiKey) { alert('请先填写 API Key'); return; }

    const prompt = `你是一位资深临床医师，擅长撰写规范、准确的住院病程记录。请根据以下信息，生成符合中国《病历书写基本规范》要求的病程记录。

【患者基本信息】
姓名：${patientName || '（未填写）'}
性别：${gender || '（未填写）'}
年龄：${age || '（未填写）'}
入院日期：${admitDate || '（未填写）'}
手术日期：${surgeryDate || '（无手术）'}
出院日期：${dischargeDate || '（未出院）'}

【既往病史】
${history || '（未提供）'}

【在院检验结果】
${labResults || '（无检验结果）'}

【在院检查报告】
${imagingResults || '（无检查报告）'}

【当前医嘱/用药方案】
${orders || '（未提供）'}

【要求】
1. 生成一份完整的住院病程记录，包含：日常病程记录（入院当天）、手术记录（如有手术）、术后病程记录、出院小结
2. 语言严谨、规范，符合中国住院病历书写标准
3. 如信息不足，请在生成时注明"该部分信息未提供，由管床医师补充"
4. 医嘱部分需与提供的用药方案一致
5. 每次记录请注明记录日期（以入院日期为基准推算）
6. 输出请用中文，直接输出病历内容，不要解释`;

    document.getElementById('output').innerText = '正在生成，请稍候...';

    try {
        const response = await fetch(apiUrl + '/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': ' application/json',
                'Authorization': 'Bearer ' + apiKey
            },
            body: JSON.stringify({
                model: modelName,
                messages: [{ role: 'user', content: prompt }]
            })
        });

        if (!response.ok) {
            document.getElementById('output').innerText = '错误：API 请求失败 (' + response.status + ')\n请检查 API URL、Key 和模型名称是否正确。';
            return;
        }

        const data = await response.json();
        const content = data.choices?.[0]?.message?.content || '（未返回内容）';
        document.getElementById('output').innerText = content;
    } catch (e) {
        document.getElementById('output').innerText = '网络错误：' + e.message;
    }
}

function copyOutput() {
    const text = document.getElementById('output').innerText;
    if (!text || text === '等待生成...') { alert('没有内容可复制'); return; }
    navigator.clipboard.writeText(text).then(() => { alert('已复制到剪贴板'); });
}
</script>
</body>
</html>
